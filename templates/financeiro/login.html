{% load static %}

<!doctype html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Login | Galera FC</title>
   <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>

<body>
   <main class="login-page">
      <div class="login-card">
         <h1>GALERA FC</h1>
         <p>Acesse a gestão financeira do rachão.</p>

         <form method="post" class="form">
            {% csrf_token %}

            <label>Usuário</label>
            {{ form.username }}

            <label>Senha</label>
            {{ form.password }}

            <button type="submit" class="btn-primary">
               Entrar
            </button>
         </form>
      </div>
   </main>
</body>
</html>
